  /api/chat/message:
    post:
      consumes:
      - multipart/form-data
      description: |-
        Send a chat message to the AI agent with optional file attachments.
        Returns 201 immediately with a message ID. The AI processes the message asynchronously.
        Poll GET /api/chat/message/{id} to check status and retrieve the response.
        Supported file types: Images (JPG, PNG, GIF, WebP), Documents (PDF, TXT, MD, CSV), Code (Go, Python, JS, TS, Rust, Java, C/C++, Ruby, PHP, Swift, Kotlin, Shell, SQL, HTML, CSS, SCSS, XML, JSON, YAML, TOML, INI, diff/patch)
        Maximum file size: 10 MB per file
        Maximum files per request: 10
      parameters:
      - description: Chat message text to send to the AI
        in: formData
        name: message
        required: true
        type: string
      - description: Project ID to associate with this chat message
        in: formData
        name: project_id
        required: true
        type: string
      - description: File attachments (screenshots, images, PDFs, text files)
        in: formData
        name: attachments
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Message accepted for async processing
          schema:
            $ref: '#/definitions/handler.ChatMessageAcceptedResponse'
        "400":
          description: Bad request - missing required fields or invalid input
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Project not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "413":
          description: File too large
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "415":
          description: Unsupported file type
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Send a chat message with optional file attachments (async)
      tags:
      - chat
  /api/chat/message/{id}:
    get:
      description: |-
        Poll this endpoint to check if an async chat message has completed processing.
        Returns the current status (processing, completed, failed) and the response when available.
      parameters:
      - description: Message/execution ID returned from POST /api/chat/message
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Message status and response
          schema:
            $ref: '#/definitions/handler.ChatMessageStatusResponse'
        "404":
          description: Message not found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Get the status and result of a chat message
      tags:
      - chat
